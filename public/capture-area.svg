<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" shape-rendering="crispEdges">
  <!-- DendroCapture · Capture Area icon · pixel-art style, 4px grid, fully symmetric -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.65"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Corner handles — L-shaped, all four connect flush to the edges -->
    <g fill="#bfdbfe">
      <!-- top-left -->
      <rect x="8"  y="8"  width="12" height="4"/>
      <rect x="8"  y="12" width="4"  height="8"/>
      <!-- top-right -->
      <rect x="56" y="8"  width="12" height="4"/>
      <rect x="64" y="12" width="4"  height="8"/>
      <!-- bottom-left -->
      <rect x="8"  y="64" width="12" height="4"/>
      <rect x="8"  y="56" width="4"  height="8"/>
      <!-- bottom-right -->
      <rect x="56" y="64" width="12" height="4"/>
      <rect x="64" y="56" width="4"  height="8"/>
    </g>

    <!-- Dashed marquee — 2 dashes per edge, perfectly even 4px gaps -->
    <g fill="#60a5fa">
      <!-- top edge -->
      <rect x="24" y="8"  width="12" height="4"/>
      <rect x="40" y="8"  width="12" height="4"/>
      <!-- bottom edge -->
      <rect x="24" y="64" width="12" height="4"/>
      <rect x="40" y="64" width="12" height="4"/>
      <!-- left edge -->
      <rect x="8"  y="24" width="4" height="12"/>
      <rect x="8"  y="40" width="4" height="12"/>
      <!-- right edge -->
      <rect x="64" y="24" width="4" height="12"/>
      <rect x="64" y="40" width="4" height="12"/>
    </g>

    <!-- Plus cursor — floats just off the bottom-right corner -->
    <g>
      <rect x="66" y="74" width="24" height="8" fill="#3b82f6"/>
      <rect x="74" y="66" width="8"  height="24" fill="#3b82f6"/>
      <rect x="74" y="74" width="8"  height="8"  fill="#bfdbfe"/>
    </g>
  </g>
</svg>
