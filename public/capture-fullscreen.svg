<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" shape-rendering="crispEdges">
  <!-- DendroCapture · Capture Fullscreen icon · pixel-art style, 4px grid -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.65"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Capture corner brackets (around everything) -->
    <g fill="#bfdbfe">
      <!-- top-left -->
      <rect x="8" y="8" width="14" height="4"/>
      <rect x="8" y="12" width="4" height="10"/>
      <!-- top-right -->
      <rect x="74" y="8" width="14" height="4"/>
      <rect x="84" y="12" width="4" height="10"/>
      <!-- bottom-left -->
      <rect x="8" y="84" width="14" height="4"/>
      <rect x="8" y="74" width="4" height="10"/>
      <!-- bottom-right -->
      <rect x="74" y="84" width="14" height="4"/>
      <rect x="84" y="74" width="4" height="10"/>
    </g>

    <!-- Monitor body -->
    <g>
      <!-- Outer bezel -->
      <rect x="20" y="22" width="56" height="40" fill="#3b82f6"/>
      <!-- Screen -->
      <rect x="24" y="26" width="48" height="32" fill="#0b1220"/>
      <!-- Screen content: subtle scanline + window shape -->
      <rect x="28" y="30" width="24" height="4" fill="#1e3a8a"/>
      <rect x="28" y="38" width="40" height="4" fill="#1e3a8a"/>
      <rect x="28" y="46" width="32" height="4" fill="#1e3a8a"/>
      <!-- Screen glare pixel -->
      <rect x="64" y="30" width="4" height="4" fill="#60a5fa"/>
    </g>

    <!-- Stand -->
    <rect x="44" y="62" width="8" height="6" fill="#3b82f6"/>
    <!-- Base -->
    <rect x="34" y="68" width="28" height="4" fill="#60a5fa"/>
  </g>
</svg>
